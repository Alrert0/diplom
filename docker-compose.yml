version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_book_reader_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_book_reader
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_book_reader_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
